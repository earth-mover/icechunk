
[package]
authors = ["LongYinan <lynweklm@gmail.com>"]
edition = "2021"
name = "icechunk-js"
version = "0.1.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3.0.0", features = ["async", "tokio_rt"] }
napi-derive = "3.0.0"
tokio = { version = "1", features = ["sync"] }
bytes = "1"
futures = "0.3"

[target.'cfg(not(target_family = "wasm"))'.dependencies]
icechunk = { path = "../icechunk" }

[target.'cfg(target_family = "wasm")'.dependencies]
icechunk = { path = "../icechunk", default-features = false }

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
