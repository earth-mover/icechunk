# python coverage comment, posted by python-check's python-coverage job;
# separate artifact name keeps its baseline apart from rust-ci's octocov-report.
# The /python suffix keys the PR comment signature (<!-- octocov:python -->) so
# it doesn't clobber rust-ci's default-signature comment.
repository: ${GITHUB_REPOSITORY}/python
coverage:
  paths:
    - coverage_python.lcov
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}/octocov-report-python
comment:
  if: is_pull_request
  message: 'Per-file / per-line detail: [codecov](https://app.codecov.io/gh/${GITHUB_REPOSITORY}/pull/${PR_NUMBER})'
  updatePrevious: true
summary:
  if: true
report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}/octocov-report-python
