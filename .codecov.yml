codecov:
  require_ci_to_pass: yes

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 0%
        base: auto

ignore:
  - "icechunk-python/tests/"
  - "icechunk-python/integration_tests/"
  - "icechunk/tests/"
  - "icechunk/examples/"
  - "icechunk-macros/"
  - "**/*test*.rs"
  - "design-docs/"

# octocov posts the PR coverage comment; codecov stays dashboard-only
comment: false
