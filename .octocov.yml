# rust-only; python coverage is aggregated and reported from python-check
# (see .octocov.python.yml)
coverage:
  paths:
    - coverage_rust.lcov
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}
comment:
  if: is_pull_request
  message: 'Per-file / per-line detail: [codecov](https://app.codecov.io/gh/${GITHUB_REPOSITORY}/pull/${PR_NUMBER})'
  updatePrevious: true
summary:
  if: true
report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}
