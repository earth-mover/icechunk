name: Rust Check - Upstream (zarrs)

on:
  push:
    branches:
      - main
      - "support/**"
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  schedule:
    - cron: "0 1 * * *" # Daily at 01:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTFLAGS: "-D warnings"
  PIXI_VERSION: "v0.63.2"

jobs:
  zarrs:
    name: zarrs-upstream
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      build-outcome: ${{ steps.build.outcome }}
      test-outcome: ${{ steps.test.outcome }}
    if: ${{
      (contains(github.event.pull_request.labels.*.name, 'test-upstream') && github.event_name == 'pull_request')
      || github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
      || github.event_name == 'push'
      }}
    steps:
      - name: Checkout icechunk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: "icechunk"
          persist-credentials: false

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: "zarrs_icechunk -> target"
          shared-key: "upstream-zarrs"
          #save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          activate-environment: true
          manifest-path: icechunk/icechunk-python/pyproject.toml

      - name: clone zarrs_icechunk
        working-directory: icechunk
        run: |
          just zarrs-upstream-clone

      - name: Patch zarrs_icechunk to use local icechunk
        working-directory: icechunk
        run: |
          just zarrs-upstream-patch

      - name: Build zarrs_icechunk
        id: build
        working-directory: icechunk
        run: |
          just zarrs-upstream-build

      - name: Test zarrs_icechunk
        id: test
        if: steps.build.outcome == 'success'
        working-directory: icechunk
        run: |
          just zarrs-upstream-test

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: zarrs-upstream-logs
          path: |
            zarrs_icechunk/build-output.log
            zarrs_icechunk/test-output.log
          if-no-files-found: ignore

  zarrs-report:
    name: zarrs-upstream-report
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: zarrs
    permissions:
      issues: write # needed to create/update failure issues when nightly tests fail
    if: |
      always()
      && (needs.zarrs.outputs.build-outcome == 'failure' || needs.zarrs.outputs.test-outcome == 'failure')
      && github.event_name == 'schedule'
      && github.repository_owner == 'earth-mover'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: zarrs-upstream-logs
          path: zarrs_icechunk

      - name: Create or update failure issue
        shell: bash
        working-directory: .
        run: |
          # Read the template
          template=$(cat .github/zarrs-upstream-failure-template.md)

          # Combine build and test output
          test_output="=== Build Output ===
          "
          if [ -f "zarrs_icechunk/build-output.log" ]; then
            test_output+=$(tail -100 zarrs_icechunk/build-output.log)
          else
            test_output+="No build output captured"
          fi

          test_output+="

          === Test Output ===
          "
          if [ -f "zarrs_icechunk/test-output.log" ]; then
            test_output+=$(tail -100 zarrs_icechunk/test-output.log)
          else
            test_output+="No test output captured"
          fi

          # Replace placeholders
          issue_body="${template//\{\{WORKFLOW\}\}/$WORKFLOW_NAME}"
          issue_body="${issue_body//\{\{RUN_ID\}\}/$RUN_ID}"
          issue_body="${issue_body//\{\{RUN_URL\}\}/$RUN_URL}"
          issue_body="${issue_body//\{\{DATE\}\}/$(date -u)}"
          issue_body="${issue_body//\{\{TEST_OUTPUT\}\}/$test_output}"

          # Check for existing open issue with same title
          issue_title="Nightly zarrs upstream test failed"
          existing_issue=$(gh issue list --state open --label "CI" --search "\"$issue_title\" in:title" --json number --jq '.[0].number // empty')

          if [ -n "$existing_issue" ]; then
            echo "Found existing open issue #$existing_issue, updating it..."
            echo "$issue_body" | gh issue edit "$existing_issue" --body-file -
            echo "Updated existing issue #$existing_issue"
          else
            echo "No existing open issue found, creating new one..."
            echo "$issue_body" | gh issue create \
              --title "$issue_title" \
              --body-file - \
              --label "CI"
            echo "Created new issue"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
