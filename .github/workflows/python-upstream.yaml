name: Python Check - Upstream

on:
  push:
    branches:
      - main
      - "support/**"
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  merge_group:
  schedule:
    - cron: "0 0 * * *" # Daily “At 00:00” UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIXI_VERSION: "v0.72.0"

jobs:
  build:
    name: upstream-dev
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      setup-outcome: ${{ steps.setup.outcome }}
      mypy-outcome: ${{ steps.mypy.outcome }}
      pytest-outcome: ${{ steps.pytest-icechunk.outcome }}
    if: ${{
      (contains(github.event.pull_request.labels.*.name, 'test-upstream') && github.event_name == 'pull_request')
      || github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
      }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          cache-write: ${{ github.ref == 'refs/heads/main' }}
          activate-environment: true
          manifest-path: icechunk-python/pyproject.toml

      - name: Stand up RustFS
        run: just rustfs-up

      - name: Wait for RustFS to be ready
        run: just rustfs-wait

      - name: Build wheels
        run: just build-wheels

      - name: setup
        id: setup
        run: |
          just python-upstream-setup

      - name: mypy
        id: mypy
        run: |
          just python-upstream-mypy

      - name: Restore cached hypothesis directory
        id: restore-hypothesis-cache
        if: always()
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: icechunk-python/.hypothesis/
          key: cache-hypothesis-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            cache-hypothesis-

      - name: describe environment
        if: steps.setup.outcome == 'success'
        run: |
          just python-upstream-describe

      - name: pytest
        id: pytest-icechunk
        if: steps.setup.outcome == 'success'
        env:
          HYPOTHESIS_EXPERIMENTAL_OBSERVABILITY: "1"
          HYPOTHESIS_PROFILE: ${{ github.event_name == 'pull_request' && 'ci' || 'nightly' }}
        run: |
          # later flag wins over the recipe's default --hypothesis-profile=nightly
          just python-upstream-pytest "--hypothesis-profile=$HYPOTHESIS_PROFILE"

      # explicitly save the cache so it gets updated, also do this even if it fails.
      - name: Save cached hypothesis directory
        id: save-hypothesis-cache
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: icechunk-python/.hypothesis/
          key: cache-hypothesis-${{ runner.os }}-${{ github.run_id }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: upstream-dev-logs
          path: |
            icechunk-python/setup-output.log
            icechunk-python/mypy-output.log
            icechunk-python/output-pytest-log.jsonl
          if-no-files-found: ignore

  build-report:
    name: upstream-dev-report
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: build
    permissions:
      issues: write # needed to create/update issues on nightly failures
    if: |
      always()
      && (needs.build.outputs.setup-outcome == 'failure' || needs.build.outputs.mypy-outcome == 'failure' || needs.build.outputs.pytest-outcome == 'failure')
      && github.event_name == 'schedule'
      && github.repository_owner == 'earth-mover'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: upstream-dev-logs
          path: icechunk-python

      - name: Create or update setup failure issue
        if: needs.build.outputs.setup-outcome == 'failure'
        shell: bash
        run: |
          # Read the template and setup output
          template=$(cat .github/setup-failure-template.md)

          setup_output="No setup output captured"
          if [ -f "icechunk-python/setup-output.log" ]; then
            setup_output=$(cat icechunk-python/setup-output.log)
          fi

          # Replace placeholders
          issue_body="${template//\{\{WORKFLOW\}\}/$WORKFLOW_NAME}"
          issue_body="${issue_body//\{\{RUN_ID\}\}/$RUN_ID}"
          issue_body="${issue_body//\{\{RUN_URL\}\}/$RUN_URL}"
          issue_body="${issue_body//\{\{DATE\}\}/$(date -u)}"
          issue_body="${issue_body//\{\{SETUP_OUTPUT\}\}/$setup_output}"

          # Check for existing open issue with same title
          issue_title="Nightly upstream dependency installation failed"
          existing_issue=$(gh issue list --state open --label "CI" --search "\"$issue_title\" in:title" --json number --jq '.[0].number // empty')

          if [ -n "$existing_issue" ]; then
            echo "Found existing open issue #$existing_issue, updating it..."
            echo "$issue_body" | gh issue edit "$existing_issue" --body-file -
            echo "Updated existing issue #$existing_issue"
          else
            echo "No existing open issue found, creating new one..."
            echo "$issue_body" | gh issue create \
              --title "$issue_title" \
              --body-file - \
              --label "CI"
            echo "Created new issue"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Create or update mypy failure issue
        if: needs.build.outputs.mypy-outcome == 'failure'
        shell: bash
        run: |
          # Read the template and mypy output
          template=$(cat .github/mypy-failure-template.md)

          mypy_output="No mypy output captured"
          if [ -f "icechunk-python/mypy-output.log" ]; then
            mypy_output=$(cat icechunk-python/mypy-output.log)
          fi

          # Replace placeholders
          issue_body="${template//\{\{WORKFLOW\}\}/$WORKFLOW_NAME}"
          issue_body="${issue_body//\{\{RUN_ID\}\}/$RUN_ID}"
          issue_body="${issue_body//\{\{RUN_URL\}\}/$RUN_URL}"
          issue_body="${issue_body//\{\{DATE\}\}/$(date -u)}"
          issue_body="${issue_body//\{\{MYPY_OUTPUT\}\}/$mypy_output}"

          # Check for existing open issue with same title
          issue_title="Nightly MyPy type checking failed with upstream dependencies"
          existing_issue=$(gh issue list --state open --label "CI" --search "\"$issue_title\" in:title" --json number --jq '.[0].number // empty')

          if [ -n "$existing_issue" ]; then
            echo "Found existing open issue #$existing_issue, updating it..."
            echo "$issue_body" | gh issue edit "$existing_issue" --body-file -
            echo "Updated existing issue #$existing_issue with latest mypy output"
          else
            echo "No existing open issue found, creating new one..."
            echo "$issue_body" | gh issue create \
              --title "$issue_title" \
              --body-file - \
              --label "CI"
            echo "Created new issue"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Generate and publish the pytest report
        if: needs.build.outputs.pytest-outcome == 'failure'
        uses: xarray-contrib/issue-from-pytest-log@054799b34bd75a5fd6c86277a4a8a575224e60c6 # v1.6.1
        with:
          log-path: icechunk-python/output-pytest-log.jsonl

  xarray-backends:
    name: xarray-tests-upstream
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      pytest-outcome: ${{ steps.pytest-xarray-backends.outcome }}
    if: ${{
      (contains(github.event.pull_request.labels.*.name, 'test-upstream') && github.event_name == 'pull_request')
      || github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
      }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          cache-write: ${{ github.ref == 'refs/heads/main' }}
          activate-environment: true
          manifest-path: icechunk-python/pyproject.toml

      - name: Build wheels
        run: just build-wheels

      - name: setup
        run: |
          just xarray-upstream-setup

      - name: Stand up RustFS
        run: just rustfs-up

      - name: Wait for RustFS to be ready
        run: just rustfs-wait

      - name: pytest
        id: pytest-xarray-backends
        env:
          ICECHUNK_XARRAY_BACKENDS_TESTS: 1
        run: |
          just xarray-upstream-pytest

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: xarray-backends-logs
          path: icechunk-python/output-pytest-log.jsonl
          if-no-files-found: ignore

  xarray-report:
    name: xarray-tests-upstream-report
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: xarray-backends
    permissions:
      issues: write # needed to create/update issues on nightly failures
    if: |
      always()
      && needs.xarray-backends.outputs.pytest-outcome == 'failure'
      && github.event_name == 'schedule'
      && github.repository_owner == 'earth-mover'
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: xarray-backends-logs
          path: xarray-backends-logs

      - name: Generate and publish the xarray backends report
        uses: xarray-contrib/issue-from-pytest-log@054799b34bd75a5fd6c86277a4a8a575224e60c6 # v1.6.1
        with:
          log-path: xarray-backends-logs/output-pytest-log.jsonl
          issue-title: "Nightly Xarray backends tests failed"
