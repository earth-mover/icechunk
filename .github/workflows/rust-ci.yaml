name: Rust CI
on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  merge_group:
  push:
    branches:
      - main
      - 'support/**'
  schedule:
    # three times a day to run the integration tests that take a long time
    - cron:  '33 3,10,15 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CI: 1
  RUST_BACKTRACE: short
  RUSTFLAGS: "-D warnings"
  RUSTUP_MAX_RETRIES: 10
  MSRV: '1.91.1'
  PIXI_VERSION: "v0.63.2"

jobs:
  rust:
    name: Rust CI
    # Headroom for the slow macos-15-intel runner
    timeout-minutes: 45
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15-intel, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Check if MSRV is up to date
        run: |
          set -e
          grep "rust-version = \"${MSRV}\"" Cargo.toml
          # shellcheck disable=SC2016
          grep "The current MSRV is \`${MSRV}\`" icechunk-python/docs/docs/reference/contributing.md

      - name: Stand up docker services
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          docker compose up -d

      - name: Wait for containers to be ready
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          for _ in {1..30}; do
              if docker compose ps --status exited --filter status==0 | grep rustfs ; then
              break
              fi
              sleep 1
          done
          for _ in {1..60}; do
              if curl --silent --fail "http://localhost:10000/devstoreaccount1/testcontainer?sv=2023-01-03&ss=btqf&srt=sco&spr=https%2Chttp&st=2025-01-06T14%3A53%3A30Z&se=2035-01-07T14%3A53%3A00Z&sp=rwdftlacup&sig=jclETGilOzONYp4Y0iK9SpVRLGyehaS5lg5booJ9VYA%3D&restype=container"; then
              break
              fi
              sleep 1
          done
          for _ in {1..60}; do
              if curl --silent --fail "http://localhost:4202/minio/health/live"; then
              break
              fi
              sleep 1
          done

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # The rust cache includes a dep on the Python version (when building icechunk-python)
          # so we need to bump the version here whenever Python version is updated
          # Currently: 3.14
          prefix-key: "coverage-py314"
          shared-key: "rust"
          #save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          activate-environment: true
          manifest-path: icechunk-python/pyproject.toml

      - name: Run tests with Docker services
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        env:
          RUST_LOG: icechunk=trace
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}

          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          TIGRIS_BUCKET: ${{ secrets.TIGRIS_BUCKET }}
          TIGRIS_REGION: ${{ secrets.TIGRIS_REGION }}
          TIGRIS_ACCESS_KEY_ID: ${{ secrets.TIGRIS_ACCESS_KEY_ID }}
          TIGRIS_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_SECRET_ACCESS_KEY }}

        run: |
          just profile=ci coverage=true compile-tests "--locked"
          just profile=ci coverage=true test

      - name: Run doc tests
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          just profile=ci coverage=true doctest

      - name: Run examples
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          just profile=ci coverage=true run-all-examples

      - name: Run unit tests only
        if: matrix.os != 'ubuntu-latest' && matrix.os != 'ubuntu-24.04-arm'
        run: |
          just profile=ci coverage=true unit-test

      # Runs nightly, on manual dispatch, or on any PR labeled
      # `run-integration-tests`
      - name: Run integration tests against object stores
        if: >-
          github.event_name == 'schedule'
          || github.event_name == 'workflow_dispatch'
          || contains(github.event.pull_request.labels.*.name, 'run-integration-tests')
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}

          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          TIGRIS_BUCKET: ${{ secrets.TIGRIS_BUCKET }}
          TIGRIS_REGION: ${{ secrets.TIGRIS_REGION }}
          TIGRIS_ACCESS_KEY_ID: ${{ secrets.TIGRIS_ACCESS_KEY_ID }}
          TIGRIS_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_SECRET_ACCESS_KEY }}

          # passed via env rather than interpolated into the shell below, to
          # satisfy zizmor's template-injection audit
          MATRIX_OS: ${{ matrix.os }}

        run: |
          # Don't let a failure (or flake) in one group hide the other.
          set +e
          rc=0
          # Most real-store ignored tests use unique prefixes, so they're safe to
          # run on every matrix OS in parallel.
          # Exclude icechunk-python: it has no Rust tests, but its PyO3 lib-test
          # binary aborts at launch trying to load libpython
          cargo test --profile ci --workspace --exclude icechunk-python --tests -- --ignored --skip rooted_roundtrip || rc=1
          # The rooted-layout tests operate at the bucket root (empty prefix, no
          # unique prefix), so concurrent matrix jobs would race on the same keys:
          # run them on a single runner.
          if [ "$MATRIX_OS" = "ubuntu-latest" ]; then
            cargo test --profile ci -p icechunk --test main rooted_roundtrip -- --ignored || rc=1
          fi
          exit $rc

      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage_rust.lcov
          flags: rust
          name: rust-coverage
          fail_ci_if_error: false

  shuttle:
    name: Shuttle concurrency tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          # The rust cache includes a dep on the Python version (when building icechunk-python)
          # so we need to bump the version here whenever Python version is updated
          # Currently: 3.14
          prefix-key: "coverage-py314"
          shared-key: "rust"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          activate-environment: true
          manifest-path: icechunk-python/pyproject.toml

      - name: Compile shuttle tests
        run: cargo test -p icechunk --features shuttle --test test_shuttle --no-run

      - name: Run shuttle tests
        run: cargo test -p icechunk --features shuttle --test test_shuttle -- --nocapture

  wasm-build:
    name: WASM Build
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    env:
      # Keep this as a compile smoke test; avoid failing on existing warnings in
      # no-default-features wasm cfg combinations.
      RUSTFLAGS: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          rustup update --no-self-update ${MSRV}
          rustup default ${MSRV}
          rustup target add wasm32-wasip1-threads

      - name: Install LLVM toolchain for wasm C deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang llvm wasi-libc libc++-dev

      - name: Show wasm clang include search paths
        run: |
          echo | clang --target=wasm32-wasi -E -x c - -v
          echo '#include <limits.h>' | clang --target=wasm32-wasi -E -x c - -v > /dev/null
          ls -la /usr/include/wasm32-wasi || true
          ls -la /usr/lib/wasm32-wasi || true
          test -f /usr/include/wasm32-wasi/limits.h && echo "found /usr/include/wasm32-wasi/limits.h"

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: wasm-${{ env.MSRV }}

      - name: Run wasm build check
        env:
          CC_wasm32_wasip1_threads: clang
          CXX_wasm32_wasip1_threads: clang++
          AR_wasm32_wasip1_threads: llvm-ar
          CC_wasm32_wasi: clang
          CXX_wasm32_wasi: clang++
          AR_wasm32_wasi: llvm-ar
          WASI_SYSROOT: /usr
          CFLAGS_wasm32_wasip1_threads: --sysroot=/usr -isystem /usr/include/wasm32-wasi
          CXXFLAGS_wasm32_wasip1_threads: --sysroot=/usr -isystem /usr/include/wasm32-wasi
          CFLAGS_wasm32_wasi: --sysroot=/usr -isystem /usr/include/wasm32-wasi
          CXXFLAGS_wasm32_wasi: --sysroot=/usr -isystem /usr/include/wasm32-wasi
        run: |
          cargo build -p icechunk --no-default-features --target wasm32-wasip1-threads

      - name: Run no-default-features lib tests (proxy for wasm feature set)
        run: |
          cargo test -p icechunk --no-default-features --lib
