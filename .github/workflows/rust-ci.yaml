name: Rust CI
on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  merge_group:
  push:
    branches:
      - main
      - 'support/**'
  schedule:
    # three times a day to run the integration tests that take a long time
    - cron:  '33 3,10,15 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CI: 1
  RUST_BACKTRACE: short
  RUSTFLAGS: "-D warnings"
  RUSTUP_MAX_RETRIES: 10
  MSRV: '1.91.1'
  PIXI_VERSION: "v0.72.0"

jobs:
  rust:
    name: Rust CI
    # Headroom for the slow macos-15-intel runner
    timeout-minutes: 45
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      coverage: ${{ matrix.os == 'ubuntu-latest' }}
    defaults:
      run:
        working-directory: ./

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15-intel, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          cache-write: ${{ github.ref == 'refs/heads/main' }}
          activate-environment: true
          manifest-path: icechunk-python/pyproject.toml

      - name: Check if MSRV is up to date
        run: just check-msrv "$MSRV"

      - name: Stand up docker services
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          just contup

      - name: Wait for containers to be ready
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: just contwait

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # The rust cache includes a dep on the Python version (when building icechunk-python)
          # so we need to bump the version here whenever Python version is updated
          # Currently: 3.12
          prefix-key: "rust-py312"
          shared-key: "rust"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run tests with Docker services
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        env:
          RUST_LOG: icechunk=trace
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}

          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          TIGRIS_BUCKET: ${{ secrets.TIGRIS_BUCKET }}
          TIGRIS_REGION: ${{ secrets.TIGRIS_REGION }}
          TIGRIS_ACCESS_KEY_ID: ${{ secrets.TIGRIS_ACCESS_KEY_ID }}
          TIGRIS_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_SECRET_ACCESS_KEY }}

        run: |
          just profile=ci coverage=${coverage} compile-tests "--locked"
          just profile=ci coverage=${coverage} test

      - name: Run doc tests
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          just profile=ci coverage=${coverage} doctest

      - name: Run examples
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          just profile=ci coverage=${coverage} run-all-examples

      - name: Run unit tests only
        if: matrix.os != 'ubuntu-latest' && matrix.os != 'ubuntu-24.04-arm'
        run: |
          just profile=ci unit-test

      # Runs nightly, on manual dispatch, or on any PR labeled
      # `run-integration-tests`
      - name: Run integration tests against object stores
        if: >-
          github.event_name == 'schedule'
          || github.event_name == 'workflow_dispatch'
          || contains(github.event.pull_request.labels.*.name, 'run-integration-tests')
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}

          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          TIGRIS_BUCKET: ${{ secrets.TIGRIS_BUCKET }}
          TIGRIS_REGION: ${{ secrets.TIGRIS_REGION }}
          TIGRIS_ACCESS_KEY_ID: ${{ secrets.TIGRIS_ACCESS_KEY_ID }}
          TIGRIS_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_SECRET_ACCESS_KEY }}

          # The rooted-layout tests operate at the bucket root (empty prefix, no
          # unique prefix), so concurrent matrix jobs would race on the same keys:
          # run them on a single runner.
          ROOTED: ${{ matrix.os == 'ubuntu-latest' }}

        run: just profile=ci test-integration "$ROOTED"

      # Python tests against the instrumented extension: their profraw merges
      # with the cargo-test profiles into one unified Rust+FFI report
      - name: Run Python tests for coverage
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          just profile=ci coverage=${coverage} develop
          just profile=ci coverage=${coverage} pytest -n 4 -m "not hypothesis"

      - name: Prepare coverage for upload
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          just profile=ci coverage=${coverage} coverage-report

      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5
        if: ${{ matrix.os == 'ubuntu-latest' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage_rust.lcov
          flags: rust
          name: rust-coverage
          fail_ci_if_error: false

  shuttle:
    name: Shuttle concurrency tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          # The rust cache includes a dep on the Python version (when building icechunk-python)
          # so we need to bump the version here whenever Python version is updated
          # Currently: 3.12
          prefix-key: "rust-py312"
          shared-key: "rust"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          cache-write: ${{ github.ref == 'refs/heads/main' }}
          activate-environment: true
          manifest-path: icechunk-python/pyproject.toml

      - name: Compile shuttle tests
        run: just shuttle-test --no-run

      - name: Run shuttle tests
        run: just shuttle-test -- --nocapture

  wasm-build:
    name: WASM Build
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Install just
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: just

      - name: Install Rust toolchain
        run: |
          rustup update --no-self-update ${MSRV}
          rustup default ${MSRV}
          rustup target add wasm32-wasip1-threads

      - name: Install LLVM toolchain for wasm C deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang llvm wasi-libc libc++-dev

      - name: Show wasm clang include search paths
        run: |
          echo | clang --target=wasm32-wasi -E -x c - -v
          echo '#include <limits.h>' | clang --target=wasm32-wasi -E -x c - -v > /dev/null
          ls -la /usr/include/wasm32-wasi || true
          ls -la /usr/lib/wasm32-wasi || true
          test -f /usr/include/wasm32-wasi/limits.h && echo "found /usr/include/wasm32-wasi/limits.h"

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: wasm-${{ env.MSRV }}

      - name: Run wasm build check
        run: just wasm-build

      - name: Run no-default-features lib tests (proxy for wasm feature set)
        run: just wasm-proxy-test
