name: Python Check

on:
  push:
    branches:
      - main
      - 'support/**'
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  PIXI_VERSION: "v0.72.0"

jobs:
  build-wheels:
    name: build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          activate-environment: true
          manifest-path: icechunk-python/pyproject.toml

      - name: Build wheels
        run: just build-wheels

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-wheels
          path: icechunk-python/dist

  test:
    name: test (${{ matrix.deps-version.name }}, ${{ matrix.deps-version.xarray }}, ${{ matrix.deps-version.dask }}, ${{ matrix.deps-version.distributed }}, ${{ matrix.deps-version.zarr }})
    runs-on: ubuntu-latest
    needs: [build-wheels]
    strategy:
      matrix:
        deps-version:
          - name: minimum
            xarray: "2025.07.1"
            dask: "2025.2.0"
            distributed: "2025.2.0"
            zarr: "3.1.0"
          - name: latest
            xarray: "latest-release"
            dask: "latest-release"
            distributed: "latest-release"
            zarr: "latest-release"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          activate-environment: true
          manifest-path: icechunk-python/pyproject.toml

      - name: Stand up RustFS
        run: just rustfs-up

      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: test-wheels
          path: icechunk-python/dist

      - name: Restore cached hypothesis directory
        id: restore-hypothesis-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: icechunk-python/.hypothesis/
          key: cache-hypothesis-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            cache-hypothesis-

      - name: Install dependencies - ${{ matrix.deps-version.name }}
        env:
          DEPS_NAME: ${{ matrix.deps-version.name }}
          XARRAY_VERSION: ${{ matrix.deps-version.xarray }}
          DASK_VERSION: ${{ matrix.deps-version.dask }}
          DISTRIBUTED_VERSION: ${{ matrix.deps-version.distributed }}
          ZARR_VERSION: ${{ matrix.deps-version.zarr }}
        run: |
          pins=""
          if [ "$DEPS_NAME" = "minimum" ]; then
            pins="xarray==$XARRAY_VERSION dask==$DASK_VERSION distributed==$DISTRIBUTED_VERSION zarr==$ZARR_VERSION"
          fi
          just install-test-wheel test $pins

      # this is here instead of earlier to give RustFS more time to get up and running
      # checking and waiting only right before we need it
      - name: Wait for RustFS to be ready
        run: just rustfs-wait

      - name: Run pytest (non-hypothesis)
        run: just pytest-venv -n 4 -m "not hypothesis"

  build-wheels-free-threaded:
    name: build-wheels-free-threaded
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          activate-environment: true
          manifest-path: icechunk-python/pyproject.toml
          environments: py314t

      - name: Build wheels
        run: just build-wheels
        env:
          PYTHON_VERSION: "3.14t"

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-wheels-free-threaded
          path: icechunk-python/dist

  test-free-threaded:
    name: test-free-threaded
    runs-on: ubuntu-latest
    needs: [build-wheels-free-threaded]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          activate-environment: true
          manifest-path: icechunk-python/pyproject.toml
          environments: py314t

      - name: Stand up RustFS
        run: just rustfs-up

      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: test-wheels-free-threaded
          path: icechunk-python/dist

      - name: Install dependencies
        env:
          PYTHON_VERSION: "3.14t"
        run: just install-test-wheel test

      - name: Wait for RustFS to be ready
        run: just rustfs-wait

      - name: Run pytest (non-hypothesis)
        run: just pytest-venv -n 4 -m "not hypothesis"

  test-hypothesis-shard:
    name: test-hypothesis-shard (${{ matrix.shard-id }})
    runs-on: ubuntu-latest
    needs: [build-wheels]
    strategy:
      fail-fast: false
      matrix:
        shard-id: [0, 1, 2]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          activate-environment: true
          manifest-path: icechunk-python/pyproject.toml

      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: test-wheels
          path: icechunk-python/dist

      - name: Restore cached hypothesis directory
        id: restore-hypothesis-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: icechunk-python/.hypothesis/
          key: cache-hypothesis-${{ runner.os }}-shard${{ matrix.shard-id }}-${{ github.run_id }}
          restore-keys: |
            cache-hypothesis-${{ runner.os }}-shard${{ matrix.shard-id }}-

      - name: Install dependencies
        run: just install-test-wheel test pytest-shard

      - name: Run hypothesis tests (shard ${{ matrix.shard-id }}/3)
        env:
          HYPOTHESIS_EXPERIMENTAL_OBSERVABILITY: "1"
          NOCOLOR: 1
          SHARD_ID: ${{ matrix.shard-id }}
        run: just pytest-venv -m hypothesis --num-shards=3 --shard-id="$SHARD_ID"

      - name: Save cached hypothesis directory
        id: save-hypothesis-cache
        if: always()
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: icechunk-python/.hypothesis/
          key: cache-hypothesis-${{ runner.os }}-shard${{ matrix.shard-id }}-${{ github.run_id }}

        # Aggregation job preserves the required "test-hypothesis" check name
  test-hypothesis:
    name: test-hypothesis
    if: always()
    needs: [test-hypothesis-shard]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all shards passed
        env:
          SHARDS_RESULT: ${{ needs.test-hypothesis-shard.result }}
        run: |
          if [ "$SHARDS_RESULT" != "success" ]; then
            echo "::error::One or more hypothesis test shards failed"
            exit 1
          fi

  compat-stateful:
    name: compat-stateful
    runs-on: ubuntu-latest
    needs: [build-wheels]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          activate-environment: true
          manifest-path: icechunk-python/pyproject.toml

      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: test-wheels
          path: icechunk-python/dist

      - name: Install icechunk + deps + icechunk_v1
        run: |
          just install-test-wheel test
          just install-ic-v1

      - name: Run cross-version stateful tests
        run: just pytest-venv tests/test_stateful_compat.py -v

  xarray-backends:
    name: xarray-backends (${{ matrix.xarray-version.name }}, ${{ matrix.xarray-version.version }}, ${{ matrix.xarray-version.zarr }})
    runs-on: ubuntu-latest
    needs: [build-wheels]
    strategy:
      matrix:
        xarray-version:
          - name: minimum
            version: "2025.07.1"
            zarr: "3.1.0"
          - name: latest-release
            version: "latest-release"
            zarr: "latest-release"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: "icechunk"
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          activate-environment: true
          manifest-path: icechunk/icechunk-python/pyproject.toml

      - name: Stand up RustFS
        working-directory: icechunk
        run: just rustfs-up

      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: test-wheels
          path: icechunk/icechunk-python/dist

      - name: Install dependencies
        shell: bash
        working-directory: icechunk/icechunk-python
        env:
          ICECHUNK_XARRAY_BACKENDS_TESTS: 1
          XARRAY_MATRIX_VERSION: ${{ matrix.xarray-version.version }}
          ZARR_MATRIX_VERSION: ${{ matrix.xarray-version.zarr }}
        run: |
          pins=""
          [ "$XARRAY_MATRIX_VERSION" = "latest-release" ] || pins="xarray==$XARRAY_MATRIX_VERSION"
          [ "$ZARR_MATRIX_VERSION" = "latest-release" ] || pins="$pins zarr==$ZARR_MATRIX_VERSION"
          just install-test-wheel test "pytest-mypy-plugins<4" $pins
          source .venv/bin/activate
          echo "Installed package versions:"
          python -c "import xarray; import zarr; print(f'xarray: {xarray.__version__}'); print(f'zarr: {zarr.__version__}')"

      - name: Checkout xarray at installed version
        working-directory: icechunk
        run: just xarray-clone-installed

      - name: Wait for RustFS to be ready
        working-directory: icechunk
        run: just rustfs-wait

      - name: Run xarray backends tests
        working-directory: icechunk
        run: just xarray-backends-pytest

  stubtest:
    name: stubtest
    runs-on: ubuntu-latest
    needs: [build-wheels]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          activate-environment: true
          manifest-path: icechunk-python/pyproject.toml

      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: test-wheels
          path: icechunk-python/dist

      - name: Install dependencies
        run: just install-test-wheel dev

      - name: Run stubtest
        run: just venv-run just stubtest

  check-xarray-docs:
    name: check-xarray-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          activate-environment: true
          manifest-path: icechunk-python/pyproject.toml

      - name: Check xarray documentation consistency
        run: just check-xarray-docs
