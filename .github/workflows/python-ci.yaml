name: Python CI and library release

on:
  workflow_dispatch:
    inputs:
      pypi_release:
        description: 'Make a PyPI release'
        required: true
        default: false
        type: boolean
      use_git_version:
        description: 'Use git-based version (e.g., 2.0.0-alpha.0-dev123+gabc1234). If false, uses Cargo.toml version.'
        required: true
        default: true
        type: boolean
      branch:
        description: 'Branch to build/release (for manual builds only)'
        type: choice
        options:
          - main
          - support/v1.x
        default: support/v1.x
  schedule:
    # run every day at 4am
    - cron: '0 4 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_INTERPRETER: "python3.12"

defaults:
  run:
    working-directory: ./icechunk-python

jobs:
  version:
    name: Generate dynamic version
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    outputs:
      version-main: ${{ steps.version-main.outputs.version }}
      version-v1: ${{ steps.version-v1.outputs.version }}
    # Note: The version generation logic is duplicated below for main and support/v1.x branches.
    # This is intentional because:
    # 1. GitHub Actions doesn't support reusable bash script blocks within a workflow
    # 2. Each branch needs its own checkout step to access its specific git history
    # 3. Alternatives would be:
    #    - Extract to .github/scripts/generate-version.sh (more complex, needs git checkout action first)
    #    - Create composite action in .github/actions/generate-version/ (overkill for simple logic)
    # If updating the logic, ensure BOTH steps are updated identically.
    steps:
      # Checkout main branch (skip if only building support/v1.x)
      - name: Checkout main
        if: ${{ github.event_name == 'schedule' || inputs.branch != 'support/v1.x' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Generate version for main
        if: ${{ github.event_name == 'schedule' || inputs.branch != 'support/v1.x' }}
        id: version-main
        run: |
          # Version generation logic for main (v2.x)
          if [[ "${{ github.event_name }}" == "schedule" ]] || [[ "${{ inputs.use_git_version }}" == "true" ]]; then
            # Match only v2.* tags to avoid confusion with v1.x tags
            if ! git describe --tags --match "v2.*" >/dev/null 2>&1; then
              echo "❌ ERROR: No v2.* tags found. Please create v2.0.0-alpha.0 tag first."
              exit 1
            fi
            TAG=$(git describe --tags --match 'v2.*' --abbrev=0 | sed 's/^v//')
            DISTANCE=$(git rev-list $(git describe --tags --match 'v2.*' --abbrev=0)..HEAD --count)
            HASH=$(git rev-parse --short HEAD)
            VERSION="${TAG}-dev${DISTANCE}+g${HASH}"
            echo "main: $VERSION (${TAG}, +${DISTANCE}, ${HASH})"
          else
            VERSION=$(grep '^version = ' icechunk-python/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
            echo "main: $VERSION (from Cargo.toml)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Checkout support/v1.x branch (skip if only building main)
      - name: Checkout support/v1.x
        if: ${{ github.event_name == 'schedule' || inputs.branch == 'support/v1.x' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: support/v1.x
          fetch-depth: 0

      - name: Generate version for support/v1.x
        if: ${{ github.event_name == 'schedule' || inputs.branch == 'support/v1.x' }}
        id: version-v1
        run: |
          # Version generation logic for support/v1.x (v1.x)
          if [[ "${{ github.event_name }}" == "schedule" ]] || [[ "${{ inputs.use_git_version }}" == "true" ]]; then
            # Match only v1.* tags to avoid confusion with v2.x tags
            if ! git describe --tags --match "v1.*" >/dev/null 2>&1; then
              echo "❌ ERROR: No v1.* tags found"
              exit 1
            fi
            TAG=$(git describe --tags --match 'v1.*' --abbrev=0 | sed 's/^v//')
            DISTANCE=$(git rev-list $(git describe --tags --match 'v1.*' --abbrev=0)..HEAD --count)
            HASH=$(git rev-parse --short HEAD)
            VERSION="${TAG}-dev${DISTANCE}+g${HASH}"
            echo "v1.x: $VERSION (${TAG}, +${DISTANCE}, ${HASH})"
          else
            VERSION=$(grep '^version = ' icechunk-python/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
            echo "v1.x: $VERSION (from Cargo.toml)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  linux:
    runs-on: ${{ matrix.platform.runner }}
    needs: version
    strategy:
      # Don't cancel the other branch/platform builds when one fails, so we can
      # still publish the wheels that did build (see the `nightly` job).
      fail-fast: false
      matrix:
        # Dynamic branch selection:
        # - schedule: Build both main and support/v1.x for nightly releases
        # - manual: Build only the selected branch (main or support/v1.x)
        # Note: fromJSON converts JSON string to array since GH Actions doesn't support array literals in expressions
        branch: ${{ github.event_name == 'schedule' && fromJSON('["main", "support/v1.x"]') || fromJSON(format('["{0}"]', inputs.branch)) }}
        platform:
          - runner: ubuntu-latest
            target: x86_64
            manylinux: auto
          # - runner: ubuntu-latest
          #   target: x86
          - runner: ubuntu-latest
            target: aarch64
            manylinux: 2_28
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0
      - name: Stand up docker services
        run: |
          docker compose up -d
      - name: Wait for RustFS to be ready
        run: |
          for _ in {1..10}; do
              if docker compose ps --status exited --filter status==0 | grep rustfs ; then
              break
              fi
              sleep 3
          done
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - name: Update version in Cargo.toml
        if: ${{ github.event_name == 'schedule' || inputs.use_git_version == true }}
        run: |
          VERSION="${{ matrix.branch == 'main' && needs.version.outputs.version-main || needs.version.outputs.version-v1 }}"
          echo "Using version: $VERSION for branch ${{ matrix.branch }}"
          sed -i 's/^version = ".*"/version = "'$VERSION'"/' Cargo.toml
      - name: Build wheels
        uses: PyO3/maturin-action@db323e2cf5679b7feb8bcb561a36b27a0bc19e79 # v1
        with:
          working-directory: icechunk-python
          target: ${{ matrix.platform.target }}
          args: --release --sdist --out dist -i ${{ env.PYTHON_INTERPRETER }}
          rust-toolchain: stable
          manylinux: ${{ matrix.platform.manylinux }} # https://github.com/PyO3/maturin-action/issues/245
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-linux-${{ matrix.branch == 'main' && 'main' || 'support-v1.x' }}-${{ matrix.platform.target }}
          path: icechunk-python/dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    needs: version
    strategy:
      # Don't cancel the other branch/platform builds when one fails, so we can
      # still publish the wheels that did build (see the `nightly` job).
      fail-fast: false
      matrix:
        branch: ${{ github.event_name == 'schedule' && fromJSON('["main", "support/v1.x"]') || fromJSON(format('["{0}"]', inputs.branch)) }}
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: aarch64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.x
      - name: Update version in Cargo.toml
        if: ${{ github.event_name == 'schedule' || inputs.use_git_version == true }}
        run: |
          VERSION="${{ matrix.branch == 'main' && needs.version.outputs.version-main || needs.version.outputs.version-v1 }}"
          echo "Using version: $VERSION for branch ${{ matrix.branch }}"
          sed -i 's/^version = ".*"/version = "'$VERSION'"/' Cargo.toml
      - name: Build wheels
        uses: PyO3/maturin-action@db323e2cf5679b7feb8bcb561a36b27a0bc19e79 # v1
        with:
          working-directory: icechunk-python
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i ${{ env.PYTHON_INTERPRETER }}
          rust-toolchain: stable
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-musllinux-${{ matrix.branch == 'main' && 'main' || 'support-v1.x' }}-${{ matrix.platform.target }}
          path: icechunk-python/dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    needs: version
    # VS2026 (MSVC v18 / toolset 14.51+) ships vcruntime_c11_stdatomic.h which emits
    # "#error: C atomics require C11 or later" when compiled without /experimental:c11atomics.
    # aws-lc-sys's build-script feature probe compiles c11.c with -WX (warnings-as-errors),
    # turning that diagnostic into a hard error and breaking the whole cargo build.
    # AWS_LC_SYS_CFLAGS is read by aws-lc-sys's build script and scoped only to its own
    # C compilations, so it's safer than setting CFLAGS globally.
    # See: https://github.com/aws/aws-lc-rs/issues/961
    env:
      AWS_LC_SYS_CFLAGS: "-std:c11 -experimental:c11atomics"
    strategy:
      # Don't cancel the other branch/platform builds when one fails, so we can
      # still publish the wheels that did build (see the `nightly` job).
      fail-fast: false
      matrix:
        branch: ${{ github.event_name == 'schedule' && fromJSON('["main", "support/v1.x"]') || fromJSON(format('["{0}"]', inputs.branch)) }}
        platform:
          - runner: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - name: Update version in Cargo.toml
        if: ${{ github.event_name == 'schedule' || inputs.use_git_version == true }}
        run: |
          $VERSION = "${{ matrix.branch == 'main' && needs.version.outputs.version-main || needs.version.outputs.version-v1 }}"
          Write-Host "Using version: $VERSION for branch ${{ matrix.branch }}"
          (Get-Content Cargo.toml) -replace '^version = ".*"', "version = `"$VERSION`"" | Set-Content Cargo.toml
        shell: powershell
      - name: Build wheels
        uses: PyO3/maturin-action@db323e2cf5679b7feb8bcb561a36b27a0bc19e79 # v1
        with:
          working-directory: icechunk-python
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i ${{ env.PYTHON_INTERPRETER }}
          rust-toolchain: stable
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-windows-${{ matrix.branch == 'main' && 'main' || 'support-v1.x' }}-${{ matrix.platform.target }}
          path: icechunk-python/dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    needs: version
    strategy:
      # Don't cancel the other branch/platform builds when one fails, so we can
      # still publish the wheels that did build (see the `nightly` job).
      fail-fast: false
      matrix:
        branch: ${{ github.event_name == 'schedule' && fromJSON('["main", "support/v1.x"]') || fromJSON(format('["{0}"]', inputs.branch)) }}
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-14
            target: aarch64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.x
      - name: Update version in Cargo.toml
        if: ${{ github.event_name == 'schedule' || inputs.use_git_version == true }}
        run: |
          VERSION="${{ matrix.branch == 'main' && needs.version.outputs.version-main || needs.version.outputs.version-v1 }}"
          echo "Using version: $VERSION for branch ${{ matrix.branch }}"
          sed -i '' 's/^version = ".*"/version = "'$VERSION'"/' Cargo.toml
      - name: Build wheels
        uses: PyO3/maturin-action@db323e2cf5679b7feb8bcb561a36b27a0bc19e79 # v1
        with:
          working-directory: icechunk-python
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i ${{ env.PYTHON_INTERPRETER }}
          rust-toolchain: stable
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-macos-${{ matrix.branch == 'main' && 'main' || 'support-v1.x' }}-${{ matrix.platform.target }}
          path: icechunk-python/dist

  sdist:
    runs-on: ubuntu-latest
    needs: version
    strategy:
      # Don't cancel the other branch/platform builds when one fails, so we can
      # still publish the wheels that did build (see the `nightly` job).
      fail-fast: false
      matrix:
        branch: ${{ github.event_name == 'schedule' && fromJSON('["main", "support/v1.x"]') || fromJSON(format('["{0}"]', inputs.branch)) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0
      - name: Update version in Cargo.toml
        if: ${{ github.event_name == 'schedule' || inputs.use_git_version == true }}
        run: |
          VERSION="${{ matrix.branch == 'main' && needs.version.outputs.version-main || needs.version.outputs.version-v1 }}"
          echo "Using version: $VERSION for branch ${{ matrix.branch }}"
          sed -i 's/^version = ".*"/version = "'$VERSION'"/' Cargo.toml
      - name: Build sdist
        uses: PyO3/maturin-action@db323e2cf5679b7feb8bcb561a36b27a0bc19e79 # v1
        with:
          working-directory: icechunk-python
          command: sdist
          args: --out dist
          rust-toolchain: stable
      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-sdist-${{ matrix.branch == 'main' && 'main' || 'support-v1.x' }}
          path: icechunk-python/dist

  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write # IMPORTANT: this permission is mandatory for trusted publishing
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.pypi_release }}
    needs: [linux, musllinux, windows, macos, sdist]
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      - name: Publish to PyPI
        uses: PyO3/maturin-action@db323e2cf5679b7feb8bcb561a36b27a0bc19e79 # v1
        with:
          command: upload
          args: --non-interactive --skip-existing wheels-*/*

  nightly:
    name: Upload nightly wheels
    runs-on: ubuntu-latest
    # Run even if some platform builds failed (always()), so we still publish the
    # wheels that did build. fail-fast: false on the build matrices keeps the
    # successful branch/platform combinations from being cancelled.
    if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
    needs: [linux, musllinux, windows, macos, sdist]
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true

      - name: Warn about failed build jobs
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "::warning title=Incomplete nightly build::Some wheel build jobs failed; uploading only the wheels that built successfully. linux=${{ needs.linux.result }} musllinux=${{ needs.musllinux.result }} windows=${{ needs.windows.result }} macos=${{ needs.macos.result }} sdist=${{ needs.sdist.result }}"

      - name: Ensure there is something to upload
        run: |
          if [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "::error title=Nothing to upload::No wheels were built by any job."
            exit 1
          fi
          echo "Wheels/sdists to upload:"
          ls -R dist

      - name: Upload nightly wheels
        uses: scientific-python/upload-nightly-action@e76cfec8a4611fd02808a801b0ff5a7d7c1b2d99
        with:
          artifacts_path: dist
          anaconda_nightly_upload_token: ${{ secrets.ANACONDA_ORG_UPLOAD_TOKEN }}

  report-failure:
    name: Open issue on nightly failure
    runs-on: ubuntu-latest
    needs: [version, linux, musllinux, windows, macos, sdist, nightly]
    # Only for scheduled nightly runs, and only when something actually failed.
    if: ${{ always() && github.event_name == 'schedule' && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
    permissions:
      contents: read
      issues: write
    defaults:
      run:
        working-directory: .
    steps:
      - name: Open or update tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          R_VERSION: ${{ needs.version.result }}
          R_LINUX: ${{ needs.linux.result }}
          R_MUSL: ${{ needs.musllinux.result }}
          R_WIN: ${{ needs.windows.result }}
          R_MAC: ${{ needs.macos.result }}
          R_SDIST: ${{ needs.sdist.result }}
          R_NIGHTLY: ${{ needs.nightly.result }}
        run: |
          set -euo pipefail
          title="Nightly wheel build failed"
          body=$(cat <<EOF
          The scheduled nightly wheel build failed.

          **Run:** $RUN_URL

          | Job | Result |
          | --- | --- |
          | version | $R_VERSION |
          | linux | $R_LINUX |
          | musllinux | $R_MUSL |
          | windows | $R_WIN |
          | macos | $R_MAC |
          | sdist | $R_SDIST |
          | nightly upload | $R_NIGHTLY |

          This issue is updated automatically by the nightly workflow. Close it once the build is green again.
          EOF
          )
          # Idempotent label so issue creation doesn't fail if it doesn't exist yet.
          gh label create nightly-failure --color B60205 --description "Nightly wheel build failures" --force || true
          existing=$(gh issue list --state open --label nightly-failure --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Commenting on existing issue #$existing"
            gh issue comment "$existing" --body "$body"
          else
            echo "Creating new tracking issue"
            gh issue create --title "$title" --label nightly-failure --body "$body"
          fi
