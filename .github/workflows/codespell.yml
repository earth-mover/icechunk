# Codespell configuration is within .codespellrc
---
name: Codespell

on:
  push:
    branches: [main, 'support/**']
  pull_request:
    branches: [main, 'support/**']
  merge_group:

permissions:
  contents: read

jobs:
  codespell:
    name: Check for spelling errors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Annotate locations with typos
        uses: codespell-project/codespell-problem-matcher@9ba2c57125d4908eade4308f32c4ff814c184633 # v1.2.0
      - name: Codespell
        uses: codespell-project/actions-codespell@8f01853be192eb0f849a5c7d721450e7a467c579 # v2.2
        with:
          skip: .git*,*.svg,*.lock,*lock.json,*.css,.codespellrc,*.cjs
          ignore_words_list: crate,firs,anc,asend
          check_hidden: true
