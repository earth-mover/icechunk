name: Code Quality Checks

on:
  pull_request:
    types: [opened, reopened, synchronize]
  merge_group:
  push:
    branches:
      - main
      - 'support/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CI: 1
  RUST_BACKTRACE: short
  RUSTFLAGS: "-D warnings"
  RUSTUP_MAX_RETRIES: 10
  PIXI_VERSION: "v0.72.0"

jobs:
  code-quality:
    name: Code Quality
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # The rust cache includes a dep on the Python version (when building icechunk-python)
          # so we need to bump the version here whenever Python version is updated
          # Currently: 3.12
          prefix-key: "rust-py312"
          shared-key: "rust"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          activate-environment: true
          manifest-path: icechunk-python/pyproject.toml

      - name: Prepare pixi for development
        run: |
          just profile=ci develop

      - name: Run formatting checks
        run: |
          just format --check

      - name: Run clippy linting
        run: |
          just profile=ci lint

      - name: Run doc tests
        run: |
          just profile=ci doctest

      - name: Python mypy type checking
        run: |
          just mypy

      - name: Run pre-commit checks (skip Rust)
        run: |
          just py-pre-commit
