name: Windows tests
on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  merge_group:
  push:
    branches:
      - main
      - 'support/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # don't cancel main runs: the post-job cache saves only happen there
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CI: 1
  RUST_BACKTRACE: short
  RUSTFLAGS: "-D warnings"
  RUSTUP_MAX_RETRIES: 10
  PIXI_VERSION: "v0.72.0"

jobs:
  rust:
    name: Run rust tests in windows
    timeout-minutes: 20
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # The rust cache includes a dep on the Python version (when building icechunk-python)
          # so we need to bump the version here whenever Python version is updated
          # Currently: 3.12
          prefix-key: "rust-py312"
          shared-key: "rust"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          cache-write: ${{ github.ref == 'refs/heads/main' }}
          manifest-path: icechunk-python/pyproject.toml
          # environment activation doesn't work on windows
          # https://github.com/prefix-dev/setup-pixi/issues/122#issuecomment-2326495414
          # activate-environment: true

      - name: Run tests
        shell: pixi run -m icechunk-python/pyproject.toml pwsh -Command {0}
        run: |
          just profile=ci unit-test
